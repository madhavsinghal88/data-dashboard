<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Data Dashboard — Paste Excel or spreadsheet data and instantly visualize it as a clean, professional UI.">
    <title>Data Dashboard — Excel to UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="data-dashboard" class="dashboard-section">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <rect x="2" y="2" width="10" height="10" rx="2" fill="#000" />
                            <rect x="16" y="2" width="10" height="10" rx="2" fill="#000" opacity="0.5" />
                            <rect x="2" y="16" width="10" height="10" rx="2" fill="#000" opacity="0.3" />
                            <rect x="16" y="16" width="10" height="10" rx="2" fill="#000" opacity="0.7" />
                        </svg>
                    </div>
                    <h1>Data Dashboard</h1>
                </div>
                <div class="header-actions">
                    <button class="btn-change-data hidden" id="btnChangeData">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                            <path d="M13.5 1.5L7 8L5 10L4.5 12.5L7 12L9 10L13.5 3.5L13.5 1.5Z" stroke="currentColor"
                                stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
                            <line x1="1" y1="13.5" x2="14" y2="13.5" stroke="currentColor" stroke-width="1.3"
                                stroke-linecap="round" />
                        </svg>
                        Change Data
                    </button>
                    <div class="view-toggle" id="viewToggle">
                        <button class="view-btn active" data-view="cards" id="btnCards" aria-label="Card view">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <rect x="1" y="1" width="7" height="7" rx="1.5" stroke="currentColor"
                                    stroke-width="1.5" />
                                <rect x="10" y="1" width="7" height="7" rx="1.5" stroke="currentColor"
                                    stroke-width="1.5" />
                                <rect x="1" y="10" width="7" height="7" rx="1.5" stroke="currentColor"
                                    stroke-width="1.5" />
                                <rect x="10" y="10" width="7" height="7" rx="1.5" stroke="currentColor"
                                    stroke-width="1.5" />
                            </svg>
                        </button>
                        <button class="view-btn" data-view="table" id="btnTable" aria-label="Table view">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <line x1="1" y1="4" x2="17" y2="4" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <line x1="1" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <line x1="1" y1="14" x2="17" y2="14" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <p class="subtitle">Paste your Excel, CSV, or table data below — it becomes a beautiful dashboard instantly.
            </p>
        </header>

        <!-- Input Area -->
        <div class="input-area" id="inputArea">
            <div class="input-wrapper">
                <textarea id="dataInput"
                    placeholder="Paste your Excel / CSV data here...&#10;&#10;Example:&#10;Name&#9;Company&#9;Role&#9;Skills&#9;Status&#10;Aarav Sharma&#9;Google&#9;SDE-III&#9;Python, ML, K8s&#9;Active&#10;Priya Mehta&#9;McKinsey&#9;Consultant&#9;Strategy, Data&#9;Interviewing&#10;Rahul Verma&#9;Razorpay&#9;PM&#9;Product, SQL&#9;Hired"
                    spellcheck="false"></textarea>
                <div class="input-actions">
                    <button id="btnParse" class="btn-primary">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M2 8L6 12L14 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Render Dashboard
                    </button>
                    <button id="btnClear" class="btn-secondary">Clear</button>
                    <button id="btnSample" class="btn-ghost">Load Sample Data</button>
                </div>
            </div>
            <div class="format-hints">
                <span class="hint-tag">Tab-separated ✓</span>
                <span class="hint-tag">CSV ✓</span>
                <span class="hint-tag">Pipe-separated ✓</span>
                <span class="hint-tag">Excel Copy-Paste ✓</span>
            </div>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar hidden" id="controlsBar">
            <div class="controls-left">
                <div class="search-box">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.5" />
                        <line x1="10.5" y1="10.5" x2="15" y2="15" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search across all columns..." />
                </div>
                <div class="filter-group" id="filterGroup"></div>
            </div>
            <div class="controls-right">
                <div class="sort-controls">
                    <label for="sortSelect">Sort by</label>
                    <select id="sortSelect">
                        <option value="">—</option>
                    </select>
                    <button id="sortDir" class="sort-dir-btn" aria-label="Toggle sort direction">↑</button>
                </div>
                <div class="row-count" id="rowCount"></div>
            </div>
        </div>

        <!-- Data Output -->
        <div class="data-output hidden" id="dataOutput">
            <!-- Cards View -->
            <div class="cards-grid" id="cardsGrid"></div>
            <!-- Table View -->
            <div class="table-wrapper" id="tableWrapper">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="22" stroke="#ccc" stroke-width="2" stroke-dasharray="4 4" />
                <path d="M18 24h12M24 18v12" stroke="#ccc" stroke-width="2" stroke-linecap="round" />
            </svg>
            <p>No results match your search or filter.</p>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
